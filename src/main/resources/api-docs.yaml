                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/ConstraintViolationProblem"
        "500":
          description: Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "503":
          description: Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "204":
          description: Successful operation
    patch:
      tags:
        - Users
      summary: Update information of a user with Personal identity number
      operationId: updateUserByPersonalNumber
      parameters:
        - name: personalNumber
          in: path
          description: Personal Identity Number
          required: true
          schema:
            type: string
        - name: municipalityId
          in: query
          description: Municipality Id-number
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
        required: true
      responses:
        "400":
          description: Bad Request
          content:
            application/problem+json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Problem"
                  - $ref: "#/components/schemas/ConstraintViolationProblem"
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
        "500":
          description: Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
        "503":
          description: Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
        "201":
          description: Successful operation
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UserResponse"
  /api/users/partyIds/{partyId}:
