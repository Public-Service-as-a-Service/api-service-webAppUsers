                $ref: "#/components/schemas/Problem"
        "503":
          description: Server Error
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    delete:
      tags:
        - Users
      summary: Delete a user with Personal identity number
      operationId: deleteByPersonalNumber
      parameters:
        - name: personalNumber
          in: path
          description: Personal Identity Number
          required: true
          schema:
            type: string
        - name: municipalityId
