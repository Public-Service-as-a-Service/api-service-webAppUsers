              schema:
                $ref: "#/components/schemas/UserResponse"
  /api-docs:
    get:
      tags:
        - API
      summary: OpenAPI
      operationId: getApiDocs
      responses:
        "200":
          description: OK
          content:
            application/yaml:
              schema:
                type: string
      x-auth-type: None
      x-throttling-tier: Unlimited
      x-wso2-mutual-ssl: Optional
components:
  schemas:
    UserRequest:
      required:
        - email
        - municipalityId
        - phoneNumber
      type: object
      properties:
        email:
          minLength: 1
          type: string
          description: Epost-adress
          example: kalle.kula@sundsvall.se
        personalNumber:
          pattern: "^((19|20)[0-9]{10})?$"
          type: string
          description: Personal number
          example: "198602300337"
        phoneNumber:
          minLength: 1
          type: string
          description: Telefonnummer
          example: "0701740669"
        municipalityId:
          minLength: 1
          type: string
          description: Kommun
          example: "2281"
        status:
          type: string
          description: Status
          example: ACTIVE
    Problem:
      type: object
      properties:
        instance:
          type: string
          format: uri
        type:
          type: string
          format: uri
        parameters:
          type: object
          additionalProperties:
            type: object
        status:
          $ref: "#/components/schemas/StatusType"
        detail:
          type: string
        title:
          type: string
    StatusType:
      type: object
      properties:
        statusCode:
          type: integer
          format: int32
        reasonPhrase:
          type: string
    ConstraintViolationProblem:
      type: object
      properties:
        cause:
          $ref: "#/components/schemas/ThrowableProblem"
        stackTrace:
          type: array
          items:
            type: object
            properties:
              classLoaderName:
                type: string
              moduleName:
                type: string
              moduleVersion:
                type: string
              methodName:
                type: string
              fileName:
                type: string
              lineNumber:
                type: integer
                format: int32
              className:
                type: string
              nativeMethod:
                type: boolean
        type:
          type: string
          format: uri
        status:
          $ref: "#/components/schemas/StatusType"
        violations:
          type: array
          items:
            $ref: "#/components/schemas/Violation"
        title:
          type: string
        message:
          type: string
        instance:
          type: string
          format: uri
        parameters:
          type: object
          additionalProperties:
            type: object
        detail:
          type: string
        suppressed:
          type: array
          items:
            type: object
            properties:
              stackTrace:
                type: array
                items:
                  type: object
                  properties:
                    classLoaderName:
                      type: string
                    moduleName:
                      type: string
                    moduleVersion:
                      type: string
                    methodName:
                      type: string
                    fileName:
                      type: string
                    lineNumber:
                      type: integer
                      format: int32
                    className:
                      type: string
                    nativeMethod:
                      type: boolean
              message:
                type: string
              localizedMessage:
                type: string
        localizedMessage:
          type: string
    ThrowableProblem:
      type: object
      properties:
        cause:
          $ref: "#/components/schemas/ThrowableProblem"
        stackTrace:
          type: array
          items:
            type: object
            properties:
              classLoaderName:
                type: string
              moduleName:
                type: string
              moduleVersion:
                type: string
              methodName:
                type: string
              fileName:
                type: string
              lineNumber:
                type: integer
                format: int32
              className:
                type: string
              nativeMethod:
                type: boolean
        message:
          type: string
        instance:
          type: string
          format: uri
        type:
          type: string
          format: uri
        parameters:
          type: object
          additionalProperties:
            type: object
        status:
          $ref: "#/components/schemas/StatusType"
        detail:
          type: string
        title:
          type: string
        suppressed:
          type: array
          items:
            type: object
            properties:
              stackTrace:
                type: array
                items:
                  type: object
                  properties:
                    classLoaderName:
                      type: string
                    moduleName:
                      type: string
                    moduleVersion:
                      type: string
                    methodName:
                      type: string
                    fileName:
                      type: string
                    lineNumber:
                      type: integer
                      format: int32
                    className:
                      type: string
                    nativeMethod:
                      type: boolean
              message:
                type: string
              localizedMessage:
                type: string
        localizedMessage:
          type: string
    Violation:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
    UserResponse:
      type: object
      properties:
        partyId:
          type: string
          description: partyId
          example: 7225dc69-28d1-4064-a1a8-5c1de5da0e62
        email:
          type: string
          description: Epost-adress
          example: kalle.kula@sundsvall.se
        phoneNumber:
          type: string
          description: Telefonnummer
          example: "0701740669"
        municipalityId:
          type: string
          description: Kommun-id
          example: "2281"
        status:
          type: string
          description: Status
          example: ACTIVE
    UpdateUserRequest:
      required:
        - municipalityId
        - phoneNumber
      type: object
      properties:
        phoneNumber:
          minLength: 1
          type: string
          description: Telefonnummer
          example: "0701740669"
        municipalityId:
          minLength: 1
          type: string
          description: Kommun
          example: "2281"
        status:
          type: string
          description: Status
          example: ACTIVE
  securitySchemes: {}
